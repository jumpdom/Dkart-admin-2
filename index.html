<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dkart Admin | Firebase Powered</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #ffff00; --dark: #000000; --card-bg: #111111; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; }
        
        .sidebar { width: 260px; height: 100vh; background: var(--card-bg); border-right: 1px solid #222; position: fixed; }
        .logo-area { padding: 30px 20px; font-weight: 800; font-size: 24px; color: var(--primary); border-bottom: 1px solid #222; text-align: center; }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #888; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--primary); background: #1a1a00; border-right: 4px solid var(--primary); }

        .main { margin-left: 260px; flex: 1; padding: 40px; min-height: 100vh; background: #050505; }
        .content-card { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #222; margin-bottom: 25px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: #888; font-size: 13px; border-bottom: 1px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }
        .p-img { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; }

        /* Form Controls */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; margin-top: 5px; }
        .btn-main { background: var(--primary); color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px; }
        
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; background: #1a1a00; color: var(--primary); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">DKART <span style="color:white">CMS</span></div>
    <div class="nav-links">
        <div class="nav-item active" onclick="showSec('dash')"><i class="fa-solid fa-house"></i> <span>Overview</span></div>
        <div class="nav-item" onclick="showSec('upload')"><i class="fa-solid fa-plus"></i> <span>Add Product</span></div>
        <div class="nav-item" onclick="showSec('orders')"><i class="fa-solid fa-shopping-bag"></i> <span>Orders List</span></div>
    </div>
</div>

<div class="main">
    <div id="dash-sec">
        <h1>Dashboard Overview</h1>
        <div style="display:flex; gap:20px;">
            <div class="content-card" style="flex:1"><h3>Orders</h3><p id="count-ords" style="font-size:30px; margin:0; color:var(--primary)">0</p></div>
            <div class="content-card" style="flex:1"><h3>Products</h3><p id="count-prods" style="font-size:30px; margin:0; color:var(--primary)">0</p></div>
        </div>
    </div>

    <div id="upload-sec" style="display:none">
        <h1>Upload Product</h1>
        <div class="content-card">
            <div class="form-grid">
                <div><label>Product Name</label><input type="text" id="p-name"></div>
                <div><label>Price (₹)</label><input type="number" id="p-price"></div>
                <div style="grid-column: span 2;"><label>Photo Link</label><input type="text" id="p-img-url"></div>
                <div>
                    <label>Sizes</label>
                    <div style="margin-top:10px;">
                        <input type="checkbox" name="sz" value="S"> S &nbsp;
                        <input type="checkbox" name="sz" value="M"> M &nbsp;
                        <input type="checkbox" name="sz" value="L"> L &nbsp;
                        <input type="checkbox" name="sz" value="XL"> XL
                    </div>
                </div>
            </div>
            <button class="btn-main" id="save-btn">Push to Firebase</button>
        </div>
    </div>

    <div id="orders-sec" style="display:none">
        <h1>Orders Management</h1>
        <div class="content-card" style="overflow-x:auto">
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Product</th>
                        <th>Amount</th>
                        <th>Address</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="order-table"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAchWzhIxqmS7G0HPpvuq6WBwcr8pXzFAE",
      authDomain: "dkart-87860.firebaseapp.com",
      projectId: "dkart-87860",
      appId: "1:894407834952:web:3067589b758c9819fe877d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.showSec = (id) => {
        ['dash', 'upload', 'orders'].forEach(s => document.getElementById(s + '-sec').style.display = 'none');
        document.getElementById(id + '-sec').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(id === 'orders') fetchOrders();
        if(id === 'dash') updateStats();
    };

    async function updateStats() {
        const o = await getDocs(collection(db, "orders"));
        const p = await getDocs(collection(db, "products"));
        document.getElementById('count-ords').innerText = o.size;
        document.getElementById('count-prods').innerText = p.size;
    }

    async function fetchOrders() {
        const snap = await getDocs(query(collection(db, "orders"), orderBy("time", "desc")));
        const tbody = document.getElementById('order-table');
        tbody.innerHTML = "";
        snap.forEach(doc => {
            const o = doc.data();
            tbody.innerHTML += `<tr>
                <td><b>${o.customer}</b><br><small>${o.phone}</small></td>
                <td>${o.name}</td>
                <td>₹${o.price}</td>
                <td><small>${o.address}</small></td>
                <td><span class="status-tag">RECIEVED</span></td>
            </tr>`;
        });
    }

    document.getElementById('save-btn').onclick = async () => {
        const sizes = Array.from(document.querySelectorAll('input[name="sz"]:checked')).map(c => c.value);
        const data = {
            name: document.getElementById('p-name').value,
            price: document.getElementById('p-price').value,
            images: [document.getElementById('p-img-url').value],
            sizes: sizes,
            time: serverTimestamp()
        };
        if(!data.name) return alert("Pehle details bhariye Amit bhai!");
        await addDoc(collection(db, "products"), data);
        alert("Firebase mein save ho gaya! ✅");
        location.reload();
    };

    updateStats();
</script>
</body>
</html>
