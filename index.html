<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dkart Admin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #ffff00; --dark: #000000; --card-bg: #111111; --text: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; overflow-x: hidden; }
        .sidebar { width: 260px; height: 100vh; background: var(--card-bg); border-right: 1px solid #222; position: fixed; transition: 0.3s; z-index: 1000; }
        .logo-area { padding: 25px 15px; font-weight: 800; font-size: 22px; color: var(--primary); border-bottom: 1px solid #222; text-align: center; }
        .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #888; transition: 0.3s; font-size: 15px; }
        .nav-item:hover, .nav-item.active { color: var(--primary); background: #1a1a00; border-right: 4px solid var(--primary); }
        .main { margin-left: 260px; flex: 1; padding: 30px; min-height: 100vh; background: #050505; transition: 0.3s; }
        .content-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; overflow-x: auto; }
        label { display: block; margin-bottom: 8px; font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 700; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; font-size: 14px; margin-bottom: 10px; }
        .btn-main { background: var(--primary); color: #000; padding: 16px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; color: #888; font-size: 12px; border-bottom: 1px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }
        @media (max-width: 768px) { .sidebar { width: 60px; } .sidebar span { display: none; } .main { margin-left: 60px; padding: 15px; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">DKART <span style="color:white">PRO</span></div>
    <div class="nav-links">
        <div class="nav-item active" onclick="showSec('dash')"><i class="fa-solid fa-chart-simple"></i> <span>Overview</span></div>
        <div class="nav-item" onclick="showSec('upload')"><i class="fa-solid fa-plus-square"></i> <span>Add Product</span></div>
        <div class="nav-item" onclick="showSec('manage')"><i class="fa-solid fa-list-check"></i> <span>Manage Items</span></div>
        <div class="nav-item" onclick="showSec('orders')"><i class="fa-solid fa-bag-shopping"></i> <span>Orders</span></div>
    </div>
</div>

<div class="main">
    <div id="dash-sec">
        <h1>Dashboard</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="content-card"><h3>Orders</h3><p id="c-ords" style="font-size:28px; color:var(--primary); margin:0">0</p></div>
            <div class="content-card"><h3>Items</h3><p id="c-prods" style="font-size:28px; color:var(--primary); margin:0">0</p></div>
        </div>
    </div>

    <div id="upload-sec" style="display:none">
        <h1>Upload Product</h1>
        <div class="content-card">
            <input type="text" id="p-name" placeholder="Product Name">
            <input type="number" id="p-price" placeholder="Price">
            <input type="text" id="p-img1" placeholder="Image URL">
            <button class="btn-main" id="save-btn">Save Product</button>
        </div>
    </div>

    <div id="manage-sec" style="display:none">
        <h1>Manage</h1>
        <div class="content-card"><table id="prod-table"><thead><tr><th>Name</th><th>Price</th></tr></thead><tbody id="prod-list"></tbody></table></div>
    </div>

    <div id="orders-sec" style="display:none">
        <h1>Orders</h1>
        <div class="content-card">
            <table>
                <thead><tr><th>Customer</th><th>Product</th><th>Status</th></tr></thead>
                <tbody id="order-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, doc, updateDoc, onSnapshot, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAchWzhIxqmS7G0HPpvuq6WBwcr8pXzFAE",
      authDomain: "dkart-87860.firebaseapp.com",
      projectId: "dkart-87860",
      appId: "1:894407834952:web:3067589b758c9819fe877d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Global Functions for Mobile Compatibility
    window.showSec = (id) => {
        ['dash', 'upload', 'orders', 'manage'].forEach(s => document.getElementById(s + '-sec').style.display = 'none');
        document.getElementById(id + '-sec').style.display = 'block';
        if(id === 'orders') fetchOrders();
        if(id === 'dash') updateStats();
    };

    window.changeStatus = async (orderId, newStatus) => {
        try {
            const orderRef = doc(db, "orders", orderId);
            await updateDoc(orderRef, { status: newStatus });
            alert("Status Updated Successfully!");
        } catch (error) {
            console.error(error);
            alert("Error: " + error.message);
        }
    };

    async function updateStats() {
        const o = await getDocs(collection(db, "orders"));
        const p = await getDocs(collection(db, "products"));
        document.getElementById('c-ords').innerText = o.size;
        document.getElementById('c-prods').innerText = p.size;
    }

    function fetchOrders() {
        const q = query(collection(db, "orders"), orderBy("time", "desc"));
        onSnapshot(q, (snap) => {
            const tbody = document.getElementById('order-list');
            tbody.innerHTML = "";
            snap.forEach(docSnap => {
                const o = docSnap.data();
                const id = docSnap.id;
                tbody.innerHTML += `<tr>
                    <td>${o.customer || 'User'}</td>
                    <td>${o.name}</td>
                    <td>
                        <select onchange="window.changeStatus('${id}', this.value)" style="background:#222; color:yellow; border:1px solid yellow; padding:5px; border-radius:5px;">
                            <option value="Pending" ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
                            <option value="Packed" ${o.status === 'Packed' ? 'selected' : ''}>Packed</option>
                            <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                            <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                            <option value="Cancelled" ${o.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                        </select>
                    </td>
                </tr>`;
            });
        });
    }

    document.getElementById('save-btn').onclick = async () => {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img1').value;
        if(!name || !price) return alert("Fill details");
        await addDoc(collection(db, "products"), { name, price, images: [img], time: serverTimestamp() });
        alert("Product Added!");
        location.reload();
    };

    updateStats();
</script>
</body>
</html>
