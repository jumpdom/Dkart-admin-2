<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dkart Admin Pro | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #ffff00; --dark: #000000; --card-bg: #111111; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; height: 100vh; background: var(--card-bg); border-right: 1px solid #222; position: fixed; }
        .logo-area { padding: 30px 20px; font-weight: 800; font-size: 24px; color: var(--primary); border-bottom: 1px solid #222; letter-spacing: 1px; }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #888; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--primary); background: #1a1a00; border-right: 4px solid var(--primary); }

        /* Main */
        .main { margin-left: 260px; flex: 1; padding: 40px; background: #050505; min-height: 100vh; }
        .content-card { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid #222; margin-bottom: 30px; }
        h1 { font-size: 24px; margin-bottom: 25px; color: var(--primary); }

        /* Form Styling */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #aaa; text-transform: uppercase; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; font-size: 14px; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn-upload { background: var(--primary); color: black; padding: 15px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 255, 0, 0.2); }

        /* Product Preview Table */
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; }
        th { background: #1a1a1a; padding: 15px; text-align: left; color: #888; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #222; vertical-align: middle; }
        .img-preview { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; background: #222; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">DKART <span style="color:white">ADMIN</span></div>
    <div class="nav-links">
        <div class="nav-item active" onclick="showSec('upload')"><i class="fa-solid fa-cloud-arrow-up"></i> <span>Upload Product</span></div>
        <div class="nav-item" onclick="showSec('inventory')"><i class="fa-solid fa-boxes-stacked"></i> <span>Manage Inventory</span></div>
        <div class="nav-item" onclick="showSec('orders')"><i class="fa-solid fa-list-check"></i> <span>Recent Orders</span></div>
    </div>
</div>

<div class="main">
    <div id="upload-sec">
        <h1>Add New Product to Dkart</h1>
        <div class="content-card">
            <div class="form-grid">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="p-name" placeholder="Enter name">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="p-cat">
                        <option>Mobile</option>
                        <option>Fashion</option>
                        <option>Gadgets</option>
                        <option>Watch</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="p-price" placeholder="999">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="p-status">
                        <option>In Stock</option>
                        <option>Out of Stock</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Photo Link (Image URL)</label>
                    <input type="text" id="p-img" placeholder="Paste Meesho/Shopsy image link here">
                </div>
                <div class="form-group full-width">
                    <label>Product Description (Details)</label>
                    <textarea id="p-desc" rows="4" placeholder="Write about quality, material, etc."></textarea>
                </div>
            </div>
            <button class="btn-upload" id="save-btn">SAVE & PUBLISH PRODUCT</button>
        </div>
    </div>

    <div id="inventory-sec" style="display:none">
        <h1>All Products</h1>
        <div class="content-card">
            <table>
                <thead>
                    <tr>
                        <th>Photo</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Category</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="inventory-list">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAchWzhIxqmS7G0HPpvuq6WBwcr8pXzFAE",
      authDomain: "dkart-87860.firebaseapp.com",
      projectId: "dkart-87860",
      appId: "1:894407834952:web:3067589b758c9819fe877d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.showSec = (id) => {
        ['upload', 'inventory'].forEach(s => document.getElementById(s + '-sec').style.display = 'none');
        document.getElementById(id + '-sec').style.display = 'block';
    }

    // Save Logic
    document.getElementById('save-btn').onclick = async () => {
        const data = {
            name: document.getElementById('p-name').value,
            price: document.getElementById('p-price').value,
            category: document.getElementById('p-cat').value,
            images: [document.getElementById('p-img').value],
            desc: document.getElementById('p-desc').value,
            status: document.getElementById('p-status').value,
            time: serverTimestamp()
        };

        if(!data.name || !data.images[0]) return alert("Bhai, photo aur name zaroori hai!");

        await addDoc(collection(db, "products"), data);
        alert("Product Uploaded! ✅");
        location.reload();
    };

    // Load Logic
    async function loadInventory() {
        const snap = await getDocs(query(collection(db, "products"), orderBy("time", "desc")));
        const list = document.getElementById('inventory-list');
        snap.forEach(doc => {
            const p = doc.data();
            list.innerHTML += `
                <tr>
                    <td><img src="${p.images[0]}" class="img-preview"></td>
                    <td>${p.name}</td>
                    <td>₹${p.price}</td>
                    <td>${p.category}</td>
                    <td><span style="color:${p.status === 'In Stock' ? '#0f0' : '#f00'}">${p.status}</span></td>
                </tr>
            `;
        });
    }
    loadInventory();
</script>
</body>
</html>
