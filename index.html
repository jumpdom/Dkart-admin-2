<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dkart Admin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #ffff00; --dark: #000000; --card-bg: #111111; --text: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; overflow-x: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; height: 100vh; background: var(--card-bg); border-right: 1px solid #222; position: fixed; transition: 0.3s; z-index: 1000; }
        .logo-area { padding: 25px 15px; font-weight: 800; font-size: 22px; color: var(--primary); border-bottom: 1px solid #222; text-align: center; }
        .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #888; transition: 0.3s; font-size: 15px; }
        .nav-item:hover, .nav-item.active { color: var(--primary); background: #1a1a00; border-right: 4px solid var(--primary); }

        /* Main Content */
        .main { margin-left: 260px; flex: 1; padding: 30px; min-height: 100vh; background: #050505; transition: 0.3s; }
        .content-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; text-transform: uppercase; font-weight: 700; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; font-size: 16px; }
        
        .size-container { display: flex; flex-wrap: wrap; gap: 15px; background: #000; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        .size-item { display: flex; align-items: center; gap: 6px; font-weight: 600; cursor: pointer; }

        .btn-main { background: var(--primary); color: #000; padding: 16px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; text-transform: uppercase; }

        /* Table Styling */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; color: #888; font-size: 12px; border-bottom: 1px solid #333; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; vertical-align: top; }
        .addr-cell { max-width: 200px; font-size: 12px; color: #ccc; line-height: 1.4; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar span { display: none; }
            .main { margin-left: 60px; padding: 15px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">DKART <span style="color:white">CMS</span></div>
    <div class="nav-links">
        <div class="nav-item active" onclick="showSec('dash')"><i class="fa-solid fa-chart-simple"></i> <span>Overview</span></div>
        <div class="nav-item" onclick="showSec('upload')"><i class="fa-solid fa-plus-square"></i> <span>Add Product</span></div>
        <div class="nav-item" onclick="showSec('orders')"><i class="fa-solid fa-bag-shopping"></i> <span>Orders</span></div>
    </div>
</div>

<div class="main">
    <div id="dash-sec">
        <h1>Dashboard</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="content-card"><h3>Orders</h3><p id="c-ords" style="font-size:28px; color:var(--primary); margin:0">0</p></div>
            <div class="content-card"><h3>Items</h3><p id="c-prods" style="font-size:28px; color:var(--primary); margin:0">0</p></div>
        </div>
    </div>

    <div id="upload-sec" style="display:none">
        <h1>Upload Product</h1>
        <div class="content-card">
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; gap: 10px;">
                    <div style="flex:1"><label>Product Name</label><input type="text" id="p-name" placeholder="Name"></div>
                    <div style="max-width: 100px;"><label>Price</label><input type="number" id="p-price" placeholder="₹"></div>
                </div>
                <div><label>Photo Link</label><input type="text" id="p-img" placeholder="Paste image URL"></div>
                <div>
                    <label>Available Sizes</label>
                    <div class="size-container">
                        <label class="size-item"><input type="checkbox" name="sz" value="S"> S</label>
                        <label class="size-item"><input type="checkbox" name="sz" value="M"> M</label>
                        <label class="size-item"><input type="checkbox" name="sz" value="L"> L</label>
                        <label class="size-item"><input type="checkbox" name="sz" value="XL"> XL</label>
                        <label class="size-item"><input type="checkbox" name="sz" value="XXL"> XXL</label>
                    </div>
                </div>
                <div><label>Description</label><textarea id="p-desc" rows="3" placeholder="Details..."></textarea></div>
            </div>
            <button class="btn-main" id="save-btn">Push to Firebase</button>
        </div>
    </div>

    <div id="orders-sec" style="display:none">
        <h1>Orders List</h1>
        <div class="content-card table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Product & Size</th>
                        <th>Price</th>
                        <th>Address</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="order-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAchWzhIxqmS7G0HPpvuq6WBwcr8pXzFAE",
      authDomain: "dkart-87860.firebaseapp.com",
      projectId: "dkart-87860",
      appId: "1:894407834952:web:3067589b758c9819fe877d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.showSec = (id) => {
        ['dash', 'upload', 'orders'].forEach(s => document.getElementById(s + '-sec').style.display = 'none');
        document.getElementById(id + '-sec').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active');
        if(id === 'orders') fetchOrders();
        if(id === 'dash') updateStats();
    };

    async function updateStats() {
        const o = await getDocs(collection(db, "orders"));
        const p = await getDocs(collection(db, "products"));
        document.getElementById('c-ords').innerText = o.size;
        document.getElementById('c-prods').innerText = p.size;
    }

    async function fetchOrders() {
        const snap = await getDocs(query(collection(db, "orders"), orderBy("time", "desc")));
        const tbody = document.getElementById('order-list');
        tbody.innerHTML = "";
        snap.forEach(doc => {
            const o = doc.data();
            tbody.innerHTML += `<tr>
                <td><b>${o.customer}</b><br><small style="color:var(--primary)">${o.phone}</small></td>
                <td>${o.name}<br><small style="color:#888">Size: ${o.size || 'N/A'}</small></td>
                <td>₹${o.price}</td>
                <td class="addr-cell">${o.address || '<span style="color:#555">No Address</span>'}</td>
                <td><span style="background:var(--primary); color:black; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:800">NEW</span></td>
            </tr>`;
        });
    }

    document.getElementById('save-btn').onclick = async () => {
        const btn = document.getElementById('save-btn');
        const sizes = Array.from(document.querySelectorAll('input[name="sz"]:checked')).map(c => c.value);
        const data = {
            name: document.getElementById('p-name').value,
            price: document.getElementById('p-price').value,
            images: [document.getElementById('p-img').value],
            sizes: sizes,
            desc: document.getElementById('p-desc').value,
            time: serverTimestamp()
        };
        if(!data.name || !data.price) return alert("Bhai, details to bharo!");
        
        btn.disabled = true;
        btn.innerText = "Uploading...";
        await addDoc(collection(db, "products"), data);
        alert("Success! 🔥");
        location.reload();
    };

    updateStats();
</script>
</body>
</html>
