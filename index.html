<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dkart Admin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #ffff00; --dark: #000000; --card-bg: #111111; --text: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; overflow-x: hidden; }
        
        .sidebar { width: 260px; height: 100vh; background: var(--card-bg); border-right: 1px solid #222; position: fixed; transition: 0.3s; z-index: 1000; }
        .logo-area { padding: 25px 15px; font-weight: 800; font-size: 22px; color: var(--primary); border-bottom: 1px solid #222; text-align: center; }
        .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #888; transition: 0.3s; font-size: 15px; }
        .nav-item:hover, .nav-item.active { color: var(--primary); background: #1a1a00; border-right: 4px solid var(--primary); }

        .main { margin-left: 260px; flex: 1; padding: 30px; min-height: 100vh; background: #050505; transition: 0.3s; }
        .content-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 700; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; font-size: 14px; margin-bottom: 10px; }
        
        .size-container { display: flex; flex-wrap: wrap; gap: 15px; background: #000; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        .size-item { display: flex; align-items: center; gap: 6px; font-weight: 600; cursor: pointer; }

        .btn-main { background: var(--primary); color: #000; padding: 16px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; text-transform: uppercase; }
        .btn-edit { background: #222; color: var(--primary); border: 1px solid var(--primary); padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-del { background: #222; color: #ff4444; border: 1px solid #ff4444; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-left: 5px; }

        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { text-align: left; padding: 12px; color: #888; font-size: 12px; border-bottom: 1px solid #333; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; vertical-align: top; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar span { display: none; }
            .main { margin-left: 60px; padding: 15px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">DKART <span style="color:white">PRO</span></div>
    <div class="nav-links">
        <div class="nav-item active" onclick="showSec('dash')"><i class="fa-solid fa-chart-simple"></i> <span>Overview</span></div>
        <div class="nav-item" onclick="showSec('upload')"><i class="fa-solid fa-plus-square"></i> <span>Add Product</span></div>
        <div class="nav-item" onclick="showSec('manage')"><i class="fa-solid fa-list-check"></i> <span>Manage Items</span></div>
        <div class="nav-item" onclick="showSec('orders')"><i class="fa-solid fa-bag-shopping"></i> <span>Orders</span></div>
    </div>
</div>

<div class="main">
    <div id="dash-sec">
        <h1>Dashboard</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="content-card"><h3>Orders</h3><p id="c-ords" style="font-size:28px; color:var(--primary); margin:0">0</p></div>
            <div class="content-card"><h3>Items</h3><p id="c-prods" style="font-size:28px; color:var(--primary); margin:0">0</p></div>
        </div>
    </div>

    <div id="upload-sec" style="display:none">
        <h1 id="upload-title">Upload Product</h1>
        <div class="content-card">
            <input type="hidden" id="edit-id">
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <div style="display: flex; gap: 10px;">
                    <div style="flex:1"><label>Product Name</label><input type="text" id="p-name" placeholder="Name"></div>
                    <div style="max-width: 120px;"><label>Price</label><input type="number" id="p-price" placeholder="₹"></div>
                </div>
                
                <div>
                    <label>Category</label>
                    <select id="p-category">
                        <option value="men">Men</option>
                        <option value="women">Women</option>
                        <option value="cosmetics">Cosmetics</option>
                        <option value="kitchen">Kitchen</option>
                        <option value="electronics">Electronics</option>
                        <option value="mobile">Mobile</option>
                    </select>
                </div>

                <div>
                    <label>Photo Link 1 (Main)</label><input type="text" id="p-img1" placeholder="URL 1">
                    <label>Photo Link 2</label><input type="text" id="p-img2" placeholder="URL 2 (Optional)">
                    <label>Photo Link 3</label><input type="text" id="p-img3" placeholder="URL 3 (Optional)">
                    <label>Photo Link 4</label><input type="text" id="p-img4" placeholder="URL 4 (Optional)">
                </div>

                <div>
                    <label>Available Sizes</label>
                    <div class="size-container">
                        <label class="size-item"><input type="checkbox" name="sz" value="S"> S</label>
                        <label class="size-item"><input type="checkbox" name="sz" value="M"> M</label>
                        <label class="size-item"><input type="checkbox" name="sz" value="L"> L</label>
                        <label class="size-item"><input type="checkbox" name="sz" value="XL"> XL</label>
                        <label class="size-item"><input type="checkbox" name="sz" value="XXL"> XXL</label>
                        <label class="size-item" style="color:var(--primary)"><input type="checkbox" name="sz" value="Free Size"> Free Size</label>
                    </div>
                </div>
                <div><label>Description</label><textarea id="p-desc" rows="3" placeholder="Details..."></textarea></div>
            </div>
            <button class="btn-main" id="save-btn">Push to Firebase</button>
            <button class="btn-main" id="cancel-edit" style="display:none; background:#333; color:white; margin-top:5px">Cancel Edit</button>
        </div>
    </div>

    <div id="manage-sec" style="display:none">
        <h1>Manage Products</h1>
        <div class="content-card table-wrapper">
            <table>
                <thead>
                    <tr><th>Product</th><th>Price</th><th>Action</th></tr>
                </thead>
                <tbody id="prod-list"></tbody>
            </table>
        </div>
    </div>

    <div id="orders-sec" style="display:none">
        <h1>Orders List</h1>
        <div class="content-card table-wrapper">
            <table>
                <thead>
                    <tr><th>Customer</th><th>Product</th><th>Price</th><th>Address</th><th>Status</th></tr>
                </thead>
                <tbody id="order-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAchWzhIxqmS7G0HPpvuq6WBwcr8pXzFAE",
      authDomain: "dkart-87860.firebaseapp.com",
      projectId: "dkart-87860",
      appId: "1:894407834952:web:3067589b758c9819fe877d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.showSec = (id) => {
        ['dash', 'upload', 'orders', 'manage'].forEach(s => {
            document.getElementById(s + '-sec').style.display = 'none';
        });
        document.getElementById(id + '-sec').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(window.event && window.event.currentTarget) window.event.currentTarget.classList.add('active');
        
        if(id === 'orders') fetchOrders();
        if(id === 'dash') updateStats();
        if(id === 'manage') fetchProducts();
    };

    async function updateStats() {
        const o = await getDocs(collection(db, "orders"));
        const p = await getDocs(collection(db, "products"));
        document.getElementById('c-ords').innerText = o.size;
        document.getElementById('c-prods').innerText = p.size;
    }

    async function fetchProducts() {
        const snap = await getDocs(query(collection(db, "products"), orderBy("time", "desc")));
        const tbody = document.getElementById('prod-list');
        tbody.innerHTML = "";
        snap.forEach(dSnap => {
            const p = dSnap.data();
            tbody.innerHTML += `<tr>
                <td><b>${p.name}</b><br><small>${p.category}</small></td>
                <td>₹${p.price}</td>
                <td>
                    <button class="btn-edit" onclick="startEdit('${dSnap.id}')"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn-del" onclick="deleteProd('${dSnap.id}')"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        });
    }

    window.deleteProd = async (id) => {
        if(confirm("Delete karna hai?")) {
            await deleteDoc(doc(db, "products", id));
            fetchProducts();
        }
    };

    window.startEdit = async (id) => {
        const dSnap = await getDoc(doc(db, "products", id));
        const p = dSnap.data();
        document.getElementById('upload-title').innerText = "Edit Product";
        document.getElementById('edit-id').value = id;
        document.getElementById('p-name').value = p.name;
        document.getElementById('p-price').value = p.price;
        document.getElementById('p-category').value = p.category;
        
        // Fill links
        document.getElementById('p-img1').value = p.images[0] || "";
        document.getElementById('p-img2').value = p.images[1] || "";
        document.getElementById('p-img3').value = p.images[2] || "";
        document.getElementById('p-img4').value = p.images[3] || "";
        
        document.getElementById('p-desc').value = p.desc;
        document.querySelectorAll('input[name="sz"]').forEach(cb => {
            cb.checked = p.sizes ? p.sizes.includes(cb.value) : false;
        });
        document.getElementById('save-btn').innerText = "Update Product";
        document.getElementById('cancel-edit').style.display = "block";
        showSec('upload');
    };

    document.getElementById('save-btn').onclick = async () => {
        const editId = document.getElementById('edit-id').value;
        const sizes = Array.from(document.querySelectorAll('input[name="sz"]:checked')).map(c => c.value);
        
        // Collect all links in an array
        const imgs = [
            document.getElementById('p-img1').value,
            document.getElementById('p-img2').value,
            document.getElementById('p-img3').value,
            document.getElementById('p-img4').value
        ].filter(url => url !== ""); // Khali links hata do

        const data = {
            name: document.getElementById('p-name').value,
            price: document.getElementById('p-price').value,
            category: document.getElementById('p-category').value,
            images: imgs,
            sizes: sizes,
            desc: document.getElementById('p-desc').value,
            time: serverTimestamp()
        };

        if(!data.name || imgs.length === 0) return alert("Bhai, kam se kam 1 photo link aur naam daalo!");

        if(editId) {
            await updateDoc(doc(db, "products", editId), data);
            alert("Update ho gaya!");
        } else {
            await addDoc(collection(db, "products"), data);
            alert("Add ho gaya!");
        }
        location.reload();
    };

    window.changeStatus = async (id, val) => {
        await updateDoc(doc(db, "orders", id), { status: val });
        alert("Status updated!");
    };

    async function fetchOrders() {
        const snap = await getDocs(query(collection(db, "orders"), orderBy("time", "desc")));
        const tbody = document.getElementById('order-list');
        tbody.innerHTML = "";
        snap.forEach(docSnap => {
            const o = docSnap.data();
            tbody.innerHTML += `<tr>
                <td><b>${o.customer}</b><br>${o.phone}</td>
                <td>${o.name}<br><small>Size: ${o.size}</small></td>
                <td>₹${o.price}</td>
                <td>${o.address}</td>
                <td>
                    <select class="status-select" onchange="changeStatus('${docSnap.id}', this.value)">
                        <option value="Pending" ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
                        <option value="Packed" ${o.status === 'Packed' ? 'selected' : ''}>Packed</option>
                        <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                        <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                    </select>
                </td>
            </tr>`;
        });
    }

    updateStats();
</script>
</body>
</html>
